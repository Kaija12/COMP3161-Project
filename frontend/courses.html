<!DOCTYPE html>
<html>
<head>
<title>Courses</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<nav class="navbar"><a href="index.html">Back</a></nav>

<div class="container">
  <h1>Courses</h1>

  <h3>Create Course (Admin)</h3>
  <input id="courseName" placeholder="Course Name">
  <button onclick="createCourse()">Create Course</button>

  <h3>All Courses</h3>
  <button onclick="loadCourses()">Load Courses</button>
  <ul id="courses"></ul>

  <h3>Register for Course</h3>
  <input id="registerCourseId" placeholder="Course ID">
  <button onclick="registerCourseUI()">Register</button>

  <h3>Course Members</h3>
  <input id="membersCourseId" placeholder="Course ID">
  <button onclick="loadMembers()">Load Members</button>
  <ul id="members"></ul>

  <h3>Course Content</h3>
  <input id="courseIdContent" placeholder="Course ID">
  <button onclick="loadContent()">Load Content</button>
  <ul id="content"></ul>
</div>

<script src="app.js"></script>
</body>
</html>
